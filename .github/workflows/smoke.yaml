name: Smoke Tests

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

permissions:
  contents: read

env:
  KUBEVIRT_VERSION: v1.8.1
  CDI_VERSION: v1.65.0
  CONTAINERDISK_IMAGE: quay.io/containerdisks/ubuntu:24.04

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache KubeVirt, CDI, and containerdisk images
        id: image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/kubevirt-images.tar
          key: kubevirt-images-${{ env.KUBEVIRT_VERSION }}-${{ env.CDI_VERSION }}-${{ env.CONTAINERDISK_IMAGE }}

      - name: Pull images for cache
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          IMAGES=(
            "quay.io/kubevirt/virt-operator:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/virt-api:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/virt-controller:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/virt-handler:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/virt-launcher:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/virt-exportproxy:${KUBEVIRT_VERSION}"
            "quay.io/kubevirt/cdi-operator:${CDI_VERSION}"
            "quay.io/kubevirt/cdi-controller:${CDI_VERSION}"
            "quay.io/kubevirt/cdi-importer:${CDI_VERSION}"
            "quay.io/kubevirt/cdi-apiserver:${CDI_VERSION}"
            "quay.io/kubevirt/cdi-uploadproxy:${CDI_VERSION}"
            "${CONTAINERDISK_IMAGE}"
          )
          pids=()
          for img in "${IMAGES[@]}"; do
            docker pull "$img" &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid"
          done
          docker save "${IMAGES[@]}" -o /tmp/kubevirt-images.tar

      - name: Create kind cluster and load cached images
        run: |
          set -euo pipefail

          cat > /tmp/kind-config.yaml <<'KINDCFG'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
              extraMounts:
                - hostPath: /dev/kvm
                  containerPath: /dev/kvm
          KINDCFG

          kind create cluster --config /tmp/kind-config.yaml --wait 60s

          # Load cached images into the kind node if they exist.
          if [ -f /tmp/kubevirt-images.tar ]; then
            kind load image-archive /tmp/kubevirt-images.tar
          fi

      - name: Install KubeVirt
        run: |
          set -euo pipefail

          kubectl apply -f "https://github.com/kubevirt/kubevirt/releases/download/${KUBEVIRT_VERSION}/kubevirt-operator.yaml"
          kubectl apply -f "https://github.com/kubevirt/kubevirt/releases/download/${KUBEVIRT_VERSION}/kubevirt-cr.yaml"

          # Wait for KubeVirt to become ready.
          kubectl -n kubevirt wait kv kubevirt --for condition=Available --timeout=300s

      - name: Install CDI
        run: |
          set -euo pipefail

          kubectl apply -f "https://github.com/kubevirt/containerized-data-importer/releases/download/${CDI_VERSION}/cdi-operator.yaml"
          kubectl apply -f "https://github.com/kubevirt/containerized-data-importer/releases/download/${CDI_VERSION}/cdi-cr.yaml"

          # Wait for CDI to become ready.
          kubectl -n cdi wait cdi cdi --for condition=Available --timeout=300s

      - name: Install cloud-provider-kind
        run: |
          # cloud-provider-kind assigns external IPs to LoadBalancer services
          # inside kind clusters, which the smoke tests need to reach the
          # ssh-gateway service.
          go install sigs.k8s.io/cloud-provider-kind@latest
          nohup cloud-provider-kind &>/tmp/cloud-provider-kind.log &

      - name: Run smoke tests
        run: python3 hack/smoke.py

      - name: Diagnostics on failure
        if: failure()
        run: |
          set -x
          echo "=== KubeVirt status ==="
          kubectl -n kubevirt get kubevirt kubevirt -o jsonpath='{.status.conditions}' | python3 -m json.tool || true
          echo ""
          echo "=== CDI status ==="
          kubectl -n cdi get cdi cdi -o jsonpath='{.status.conditions}' | python3 -m json.tool || true
          echo ""
          echo "=== VMs ==="
          kubectl get vm -n blip -o wide || true
          echo ""
          echo "=== VMIs ==="
          kubectl get vmi -n blip -o wide || true
          echo ""
          echo "=== DataVolumes ==="
          kubectl get dv -n blip -o wide || true
          echo ""
          echo "=== PVCs ==="
          kubectl get pvc -n blip -o wide || true
          echo ""
          echo "=== Pods in blip namespace ==="
          kubectl get pods -n blip -o wide || true
          echo ""
          echo "=== Events in blip namespace (last 30) ==="
          kubectl get events -n blip --sort-by=.lastTimestamp | tail -30 || true
          echo ""
          echo "=== Events in kubevirt namespace (last 15) ==="
          kubectl get events -n kubevirt --sort-by=.lastTimestamp | tail -15 || true
          echo ""
          echo "=== Events in cdi namespace (last 15) ==="
          kubectl get events -n cdi --sort-by=.lastTimestamp | tail -15 || true
