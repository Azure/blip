name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: blip

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

      - name: Generate deployment manifest
        env:
          BLIP_TAG: ${{ steps.tag.outputs.version }}
        run: |
          export REGISTRY="${{ env.REGISTRY }}"
          export BLIP_TAG
          mkdir -p dist
          envsubst '$REGISTRY $BLIP_TAG' < deploy.yaml > dist/manifest.yaml

      - name: Copy VM pool manifest
        run: cp pool.yaml dist/pool.yaml

      - name: Cross-compile kubectl-blip
        run: |
          set -euo pipefail
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            archive="kubectl-blip_${os}_${arch}.tar.gz"
            echo "Building ${os}/${arch}..."
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -ldflags="-s -w" -o kubectl-blip ./cmd/kubectl-blip
            tar czf "dist/${archive}" kubectl-blip
            rm kubectl-blip
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum kubectl-blip_*.tar.gz > checksums.txt

      - name: Render krew manifest
        env:
          TAG: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          sha_linux_amd64="$(awk '/kubectl-blip_linux_amd64/{print $1}' dist/checksums.txt)"
          sha_linux_arm64="$(awk '/kubectl-blip_linux_arm64/{print $1}' dist/checksums.txt)"
          sha_darwin_amd64="$(awk '/kubectl-blip_darwin_amd64/{print $1}' dist/checksums.txt)"
          sha_darwin_arm64="$(awk '/kubectl-blip_darwin_arm64/{print $1}' dist/checksums.txt)"
          export TAG sha_linux_amd64 sha_linux_arm64 sha_darwin_amd64 sha_darwin_arm64
          envsubst '$TAG $sha_linux_amd64 $sha_linux_arm64 $sha_darwin_amd64 $sha_darwin_arm64' < .krew.yaml > dist/blip.yaml

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.version }}" \
            --generate-notes \
            dist/manifest.yaml \
            dist/pool.yaml \
            dist/kubectl-blip_*.tar.gz \
            dist/checksums.txt \
            dist/blip.yaml

