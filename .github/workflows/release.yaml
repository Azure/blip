name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: blip

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}

      - name: Build deployment manifest
        env:
          BLIP_TAG: ${{ steps.tag.outputs.version }}
        run: |
          export REGISTRY="${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}"
          export BLIP_TAG
          mkdir -p dist
          { cat config/crd/blip.io_blipowners.yaml; echo '---'; envsubst '$REGISTRY $BLIP_TAG' < manifests/deploy.yaml; } > dist/manifest.yaml

      - name: Copy VM pool manifest
        run: cp manifests/pool.yaml dist/pool.yaml

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.version }}" > /dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.version }}" \
              --generate-notes \
              dist/manifest.yaml \
              dist/pool.yaml
          else
            gh release upload "${{ steps.tag.outputs.version }}" \
              --clobber \
              dist/manifest.yaml \
              dist/pool.yaml
          fi
