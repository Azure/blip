---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: blipowners.blip.io
spec:
  group: blip.io
  names:
    kind: BlipOwner
    listKind: BlipOwnerList
    plural: blipowners
    shortNames:
    - bo
    singular: blipowner
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BlipOwner represents a single authorization entry for the Blip SSH gateway.
          Each CR encodes exactly one of: an SSH public key, an OIDC provider
          configuration, or a GitHub Actions runner repo association.

          Exactly one of spec.sshKey, spec.oidc, or spec.actionsRepo must be set.
          This constraint is enforced by CEL validation rules on the CRD schema.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BlipOwnerSpec defines the desired state of a BlipOwner.
              Exactly one of SSHKey, OIDC, or ActionsRepo must be set.
            properties:
              actionsRepo:
                description: ActionsRepo associates a GitHub repository for Actions
                  runner polling.
                properties:
                  repo:
                    description: Repo is the full "owner/repo" identifier (e.g. "my-org/my-repo").
                    minLength: 1
                    type: string
                required:
                - repo
                type: object
                x-kubernetes-validations:
                - message: repo must be in 'owner/repo' format
                  rule: self.repo.matches('^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$')
              oidc:
                description: OIDC configures an OIDC provider for token-based authentication.
                properties:
                  allowedSubjects:
                    description: |-
                      AllowedSubjects is a list of allowed subject patterns.
                      Supports glob patterns (e.g. "repo:my-org/*:*").
                      When empty, any valid token from this issuer is accepted.
                    items:
                      type: string
                    type: array
                  audience:
                    description: Audience is the expected "aud" claim.
                    minLength: 1
                    type: string
                  clientID:
                    description: |-
                      ClientID is the OAuth2 client ID for device flow.
                      Required when deviceFlow is true.
                    type: string
                  deviceAuthURL:
                    description: |-
                      DeviceAuthURL is the OAuth2 device authorization endpoint (must be HTTPS).
                      Required when deviceFlow is true.
                    type: string
                  deviceFlow:
                    description: DeviceFlow enables the OAuth2 Device Authorization
                      Grant (RFC 8628).
                    type: boolean
                  identityClaim:
                    description: |-
                      IdentityClaim is the JWT claim used as the user identity.
                      Defaults to "sub" if empty.
                    type: string
                  issuer:
                    description: Issuer is the OIDC issuer URL (must be HTTPS).
                    minLength: 1
                    type: string
                  scopes:
                    description: Scopes is the list of OAuth2 scopes to request during
                      device flow.
                    items:
                      type: string
                    type: array
                  tokenURL:
                    description: |-
                      TokenURL is the OAuth2 token endpoint for polling device flow completion (must be HTTPS).
                      Required when deviceFlow is true.
                    type: string
                required:
                - audience
                - issuer
                type: object
                x-kubernetes-validations:
                - message: issuer must start with https://
                  rule: self.issuer.startsWith('https://')
                - message: clientID, deviceAuthURL, and tokenURL are required when
                    deviceFlow is true
                  rule: '!self.deviceFlow || (self.clientID != '''' && self.deviceAuthURL
                    != '''' && self.tokenURL != '''')'
                - message: deviceAuthURL must start with https://
                  rule: '!has(self.deviceAuthURL) || self.deviceAuthURL == '''' ||
                    self.deviceAuthURL.startsWith(''https://'')'
                - message: tokenURL must start with https://
                  rule: '!has(self.tokenURL) || self.tokenURL == '''' || self.tokenURL.startsWith(''https://'')'
              sshKey:
                description: SSHKey configures an explicitly allowed SSH public key.
                properties:
                  publicKey:
                    description: |-
                      PublicKey is the SSH public key in authorized_keys format
                      (e.g. "ssh-ed25519 AAAAC3... alice@laptop").
                    minLength: 1
                    type: string
                required:
                - publicKey
                type: object
            type: object
            x-kubernetes-validations:
            - message: exactly one of sshKey, oidc, or actionsRepo must be set
              rule: '(has(self.sshKey) ? 1 : 0) + (has(self.oidc) ? 1 : 0) + (has(self.actionsRepo)
                ? 1 : 0) == 1'
          status:
            description: BlipOwnerStatus describes the observed state of a BlipOwner.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  BlipOwner's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              fingerprint:
                description: |-
                  Fingerprint is the computed SHA256 fingerprint for SSHKey entries.
                  Empty for non-SSHKey types.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
