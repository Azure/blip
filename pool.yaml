apiVersion: v1
kind: Secret
metadata:
  name: default-cloudinit
  namespace: blip
stringData:
  userdata: |
    #cloud-config
    disk_setup:
        /dev/vdb:
            table_type: gpt
            overwrite: false
    fs_setup:
        - device: /dev/vdb
          filesystem: ext4
          overwrite: false
    mounts:
        - - /dev/vdb
          - /home
          - ext4
          - defaults,nofail
          - "0"
          - "2"
    users:
        - name: runner
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: true
    package_update: false
    package_upgrade: false
    write_files:
        - path: /usr/local/bin/blip
          permissions: "0755"
          content: |
            #!/bin/bash
            set -euo pipefail

            readonly SA_DIR="/var/run/secrets/kubernetes.io/serviceaccount"

            # Build the KubeVirt VM API URL for this VM.
            _vm_api_url() {
            	local token ns ca vm_name
            	token="$(cat "$SA_DIR/token")"
            	ns="$(cat "$SA_DIR/namespace")"
            	ca="$SA_DIR/ca.crt"
            	vm_name="$(hostname)"

            	# Export for caller use.
            	VM_TOKEN="$token"
            	VM_CA="$ca"
            	VM_NAME="$vm_name"
            	VM_API_URL="https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/${ns}/virtualmachines/${vm_name}"
            }

            # Extract a JSON string value by key from flat JSON.  Handles simple
            # single-line objects only (no jq dependency in the VM image).
            _json_field() {
            	local body="$1" key="$2"
            	printf '%s' "$body" |
            		grep -oP "\"${key}\"\\s*:\\s*\"[^\"]*\"" |
            		head -1 |
            		cut -d'"' -f4
            }

            # Parse a duration string like "5m", "2h", "1h30m" into total seconds.
            # Supports hours (h) and minutes (m).
            _parse_duration() {
            	local input="$1"
            	local total=0 num=""

            	# Validate: only digits, 'h', and 'm' allowed.
            	if ! printf '%s' "$input" | grep -qE '^[0-9]+[hm]([0-9]+[hm])?$'; then
            		echo "Invalid duration format: $input (use e.g. 5m, 2h, 1h30m)" >&2
            		return 1
            	fi

            	while [ -n "$input" ]; do
            		# Extract leading digits.
            		num=$(printf '%s' "$input" | grep -oE '^[0-9]+')
            		if [ -z "$num" ]; then
            			echo "Invalid duration format" >&2
            			return 1
            		fi
            		# Remove the digits from input.
            		input="${input#"$num"}"
            		# Read the unit character.
            		local unit="${input:0:1}"
            		input="${input:1}"
            		case "$unit" in
            		h) total=$((total + num * 3600)) ;;
            		m) total=$((total + num * 60)) ;;
            		*)
            			echo "Unknown duration unit: $unit" >&2
            			return 1
            			;;
            		esac
            	done

            	printf '%d' "$total"
            }

            usage() {
            	echo "Usage: blip <command>"
            	echo ""
            	echo "Commands:"
            	echo "  retain [--ttl]  Preserve this blip across disconnects"
            	exit 1
            }

            cmd_retain() {
            	_vm_api_url

            	local ttl_flag=""
            	local new_ttl_sec=""

            	# Parse arguments.
            	while [ $# -gt 0 ]; do
            		case "$1" in
            		--ttl)
            			if [ $# -lt 2 ]; then
            				echo "Error: --ttl requires a duration value (e.g. 5m, 2h)" >&2
            				exit 1
            			fi
            			ttl_flag="$2"
            			shift 2
            			;;
            		--ttl=*)
            			ttl_flag="${1#--ttl=}"
            			shift
            			;;
            		*)
            			echo "Unknown argument: $1" >&2
            			echo "Usage: blip retain [--ttl <duration>]" >&2
            			exit 1
            			;;
            		esac
            	done

            	# Build the patch: always set ephemeral=false.
            	local patch
            	if [ -n "$ttl_flag" ]; then
            		new_ttl_sec=$(_parse_duration "$ttl_flag") || exit 1

            		# Cap at 12 hours (43200 seconds).
            		if [ "$new_ttl_sec" -gt 43200 ]; then
            			echo "Warning: TTL capped to 12h (maximum total lifespan)" >&2
            			new_ttl_sec=43200
            		fi

            		patch=$(printf '{"metadata":{"annotations":{"blip.io/ephemeral":"false","blip.io/max-duration":"%d"}}}' "$new_ttl_sec")
            	else
            		patch='{"metadata":{"annotations":{"blip.io/ephemeral":"false"}}}'
            	fi

            	local code response
            	response=$(curl --silent --write-out "\n%{http_code}" \
            		--cacert "$VM_CA" \
            		-X PATCH \
            		-H "Authorization: Bearer ${VM_TOKEN}" \
            		-H "Content-Type: application/merge-patch+json" \
            		-d "$patch" \
            		"$VM_API_URL")

            	code=$(printf '%s' "$response" | tail -1)
            	local body
            	body=$(printf '%s' "$response" | sed '$d')

            	if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            		local session_id
            		session_id=$(_json_field "$body" 'blip\.io/session-id')

            		echo "Blip retained successfully."
            		if [ -n "$session_id" ]; then
            			echo ""
            			echo "  Session ID: $session_id"
            			echo ""
            			echo "  Reconnect with: ssh $session_id@<gateway-host>"
            		fi
            		if [ -n "$ttl_flag" ]; then
            			echo "  TTL updated to: $ttl_flag"
            		fi

            		# Allow output to flush through the SSH channel before exiting.
            		sleep 0.1
            	else
            		echo "Failed to retain blip (HTTP $code)" >&2
            		exit 1
            	fi
            }

            if [ $# -lt 1 ]; then
            	usage
            fi

            case "$1" in
            retain)
            	shift
            	cmd_retain "$@"
            	;;
            *) usage ;;
            esac
    runcmd:
        - - /bin/bash
          - -c
          - |
            exec > /dev/ttyS0 2>&1
            echo "[blip-init] mounting service account ISO..."
            mkdir -p /var/run/secrets/kubernetes.io/serviceaccount
            mount -t iso9660 -o ro /dev/vdc /var/run/secrets/kubernetes.io/serviceaccount
            cp -a /var/run/secrets/kubernetes.io/serviceaccount /var/run/secrets/kubernetes.io/serviceaccount-rw
            umount /var/run/secrets/kubernetes.io/serviceaccount
            rmdir /var/run/secrets/kubernetes.io/serviceaccount
            mv /var/run/secrets/kubernetes.io/serviceaccount-rw /var/run/secrets/kubernetes.io/serviceaccount
            chmod -R a+r /var/run/secrets/kubernetes.io/serviceaccount
            echo "[blip-init] service account mounted"
        - - /bin/bash
          - -c
          - |
            #!/bin/bash

            exec > /dev/ttyS0 2>&1
            set -euo pipefail
            trap 'echo "[blip-setup] ERROR on line $LINENO (exit $?)"' ERR

            readonly SA_DIR="/var/run/secrets/kubernetes.io/serviceaccount"

            main() {
            	local token ns ca vm_name api_url
            	token="$(cat "$SA_DIR/token")"
            	ns="$(cat "$SA_DIR/namespace")"
            	ca="$SA_DIR/ca.crt"
            	vm_name="$(hostname)"
            	api_url="https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/${ns}/virtualmachines/${vm_name}"
            	echo "[blip-setup] vm=$vm_name ns=$ns"

            	# --- 1. Generate a VM client key pair ---
            	ssh-keygen -t ed25519 -f /etc/ssh/ssh_client_ed25519_key -N "" -q
            	chmod 644 /etc/ssh/ssh_client_ed25519_key
            	chmod 644 /etc/ssh/ssh_client_ed25519_key.pub

            	# --- 2. Fetch gateway client pubkey from ConfigMap -> authorized_keys ---
            	local cm_url="https://kubernetes.default.svc/api/v1/namespaces/${ns}/configmaps/ssh-gateway-client-pubkey"
            	local gw_client_pubkey=""
            	for _retry in $(seq 1 30); do
            		local cm_body=""
            		cm_body=$(curl --silent --connect-timeout 5 --max-time 10 --cacert "$ca" \
            			-H "Authorization: Bearer ${token}" \
            			"$cm_url" 2>&1) || { sleep 2; continue; }
            		gw_client_pubkey=$(printf '%s' "$cm_body" | grep -oP '"client_key\.pub"\s*:\s*"[^"]*"' | head -1 | cut -d'"' -f4 | sed 's/\\n/\n/g') || true
            		if [ -n "$gw_client_pubkey" ]; then
            			break
            		fi
            		sleep 2
            	done
            	if [ -z "$gw_client_pubkey" ]; then
            		echo "[blip-setup] FATAL: could not fetch gateway client pubkey" >&2
            		exit 1
            	fi
            	mkdir -p ~runner/.ssh
            	printf '%s\n' "$gw_client_pubkey" > ~runner/.ssh/authorized_keys
            	chmod 600 ~runner/.ssh/authorized_keys
            	chown -R runner:runner ~runner/.ssh

            	# --- 3. Fetch gateway host pubkey from ConfigMap -> known_hosts ---
            	local host_cm_url="https://kubernetes.default.svc/api/v1/namespaces/${ns}/configmaps/ssh-gateway-host-pubkey"
            	local gw_host_pubkey=""
            	for _retry in $(seq 1 30); do
            		local host_cm_body
            		host_cm_body=$(curl --silent --connect-timeout 5 --max-time 10 --cacert "$ca" \
            			-H "Authorization: Bearer ${token}" \
            			"$host_cm_url") || { sleep 2; continue; }
            		gw_host_pubkey=$(printf '%s' "$host_cm_body" | grep -oP '"host_key\.pub"\s*:\s*"[^"]*"' | head -1 | cut -d'"' -f4 | sed 's/\\n/\n/g') || true
            		if [ -n "$gw_host_pubkey" ]; then
            			break
            		fi
            		sleep 2
            	done
            	if [ -n "$gw_host_pubkey" ]; then
            		# Write known_hosts entries for the gateway service names.
            		# SSH uses the resolved HostName for known_hosts lookup, and
            		# for the default port (22) it uses plain hostnames (no brackets).
            		printf '%s %s\n' "ssh-gateway.blip.svc.cluster.local" "$gw_host_pubkey" > ~runner/.ssh/known_hosts
            		printf '%s %s\n' "blip" "$gw_host_pubkey" >> ~runner/.ssh/known_hosts
            		printf '%s %s\n' "blip-gateway" "$gw_host_pubkey" >> ~runner/.ssh/known_hosts
            		chmod 644 ~runner/.ssh/known_hosts
            		chown runner:runner ~runner/.ssh/known_hosts
            	fi

            	# --- 4. Restart sshd BEFORE registering annotations ---
            	# sshd may already be running (Ubuntu 24.04 starts it via socket
            	# activation). Restart to ensure it is running and picks up any
            	# configuration changes (e.g. new authorized_keys). This MUST
            	# happen before the annotation PATCH below, because the gateway
            	# treats the annotations as the VM readiness signal and may
            	# connect immediately. If sshd restarts after the gateway has
            	# already established an SSH session, the connection is killed
            	# and the proxy hangs until the client times out.
            	systemctl enable ssh
            	systemctl restart ssh

            	# --- 5. Register host-key and client-key annotations ---
            	# This is the readiness signal: once these annotations are set,
            	# the gateway considers this VM eligible for allocation.
            	local host_key client_key patch
            	host_key="$(awk '{print $1, $2}' /etc/ssh/ssh_host_ed25519_key.pub)"
            	client_key="$(awk '{print $1, $2}' /etc/ssh/ssh_client_ed25519_key.pub)"
            	patch=$(printf '{"metadata":{"annotations":{"blip.io/host-key":"%s","blip.io/client-key":"%s"}}}' "$host_key" "$client_key")

            	local ok=false code
            	for _retry in $(seq 1 10); do
            		code=$(curl --silent --connect-timeout 5 --max-time 10 --output /dev/null --write-out "%{http_code}" \
            			--cacert "$ca" \
            			-X PATCH \
            			-H "Authorization: Bearer ${token}" \
            			-H "Content-Type: application/merge-patch+json" \
            			-d "$patch" \
            			"$api_url")
            		if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            			ok=true
            			break
            		fi
            		echo "[blip-setup] PATCH retry $_retry: HTTP $code"
            		sleep 2
            	done

            	if [ "$ok" != "true" ]; then
            		echo "[blip-setup] FATAL: failed to register key annotations (HTTP $code)" >&2
            		exit 1
            	fi

            	echo "[blip-setup] complete"
            }

            main "$@"
        - chmod -x /etc/update-motd.d/*
        - systemctl disable --now snapd.service snapd.socket snapd.seeded.service snapd.snap-repair.timer multipathd.service multipathd.socket ModemManager.service unattended-upgrades.service apt-daily.timer apt-daily-upgrade.timer udisks2.service polkit.service fwupd.service packagekit.service networkd-dispatcher.service 2>/dev/null || true
        - apt-get purge -y --auto-remove snapd && rm -rf /snap /var/snap /var/lib/snapd /var/cache/snapd || true
        - touch /etc/cloud/cloud-init.disabled
        - mkdir -p /etc/systemd/journald.conf.d
        - printf '[Journal]\nSystemMaxUse=16M\nRuntimeMaxUse=16M\n' > /etc/systemd/journald.conf.d/size.conf
        - systemctl restart systemd-journald
        - sync && echo 3 > /proc/sys/vm/drop_caches || true
---
apiVersion: pool.kubevirt.io/v1beta1
kind: VirtualMachinePool
metadata:
  name: default
  namespace: blip
spec:
  replicas: 5
  selector:
    matchLabels:
      blip.io/pool: default
  virtualMachineTemplate:
    metadata:
      labels:
        blip.io/pool: default
    spec:
      runStrategy: Always
      template:
        metadata:
          labels:
            blip.io/pool: default
        spec:
          evictionStrategy: None
          priorityClassName: blip-low-priority
          domain:
            cpu:
              cores: 2
              sockets: 1
              threads: 1
            devices:
              disks:
              - disk:
                  bus: virtio
                name: rootdisk
              - disk:
                  bus: virtio
                name: datadisk
              - disk:
                  bus: virtio
                name: sadisk
              - disk:
                  bus: virtio
                name: cloudinitdisk
              interfaces:
              - masquerade: {}
                name: default
            memory:
              guest: 4Gi
            resources:
              overcommitGuestOverhead: true
              requests:
                cpu: 500m
                memory: 1Gi
          networks:
          - name: default
            pod: {}
          readinessProbe:
            failureThreshold: 10
            initialDelaySeconds: 5
            periodSeconds: 3
            tcpSocket:
              port: 22
          terminationGracePeriodSeconds: 5
          volumes:
          - containerDisk:
              image: quay.io/containerdisks/ubuntu:24.04
              imagePullPolicy: IfNotPresent
            name: rootdisk
          - emptyDisk:
              capacity: 20Gi
            name: datadisk
          - name: sadisk
            serviceAccount:
              serviceAccountName: vm-release
          - cloudInitNoCloud:
              secretRef:
                name: default-cloudinit
            name: cloudinitdisk
