apiVersion: v1
kind: Secret
metadata:
  name: default-cloudinit
  namespace: blip
stringData:
  userdata: |
    #cloud-config
    users:
        - name: runner
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          lock_passwd: true
    package_update: false
    package_upgrade: false
    runcmd:
        - - /bin/bash
          - -c
          - |
            exec > /dev/ttyS0 2>&1
            set -euo pipefail
            trap 'echo "[blip-setup] ERROR on line $LINENO (exit $?)"' ERR

            GW_HOST="ssh-gateway.blip.svc.cluster.local"
            GW_CLIENT_PUBKEY_DIR="/var/run/blip/gateway-client-pubkey"
            GW_HOST_PUBKEY_DIR="/var/run/blip/gateway-host-pubkey"
            SA_TOKEN_DIR="/var/run/secrets/kubernetes.io/serviceaccount"

            # Mount virtiofs volumes.
            for vol in "$GW_CLIENT_PUBKEY_DIR" "$GW_HOST_PUBKEY_DIR" "$SA_TOKEN_DIR"; do
            	mkdir -p "$vol"
            done
            mount -t virtiofs gw-client-pubkey "$GW_CLIENT_PUBKEY_DIR"
            mount -t virtiofs gw-host-pubkey "$GW_HOST_PUBKEY_DIR"
            mount -t virtiofs sa-token "$SA_TOKEN_DIR"

            # Generate VM client key pair.
            ssh-keygen -t ed25519 -f /etc/ssh/ssh_client_ed25519_key -N "" -q
            chmod 600 /etc/ssh/ssh_client_ed25519_key
            chown runner:runner /etc/ssh/ssh_client_ed25519_key
            chmod 644 /etc/ssh/ssh_client_ed25519_key.pub

            # Wait for gateway client pubkey and install as authorized_keys.
            gw_client_pubkey=""
            for _ in $(seq 1 30); do
            	if [ -s "$GW_CLIENT_PUBKEY_DIR/client_key.pub" ]; then
            		gw_client_pubkey="$(cat "$GW_CLIENT_PUBKEY_DIR/client_key.pub")"
            		break
            	fi
            	sleep 2
            done
            [ -n "$gw_client_pubkey" ] || { echo "[blip-setup] FATAL: no gateway client pubkey" >&2; exit 1; }
            mkdir -p ~runner/.ssh
            printf '%s\n' "$gw_client_pubkey" > ~runner/.ssh/authorized_keys
            chmod 600 ~runner/.ssh/authorized_keys
            chown -R runner:runner ~runner/.ssh

            # Install gateway host pubkey as known_hosts (port 2222 bracket format).
            if [ -s "$GW_HOST_PUBKEY_DIR/host_key.pub" ]; then
            	gw_host_pubkey="$(cat "$GW_HOST_PUBKEY_DIR/host_key.pub")"
            	{
            		printf '[%s]:%s %s\n' "$GW_HOST" 2222 "$gw_host_pubkey"
            		printf '[%s]:%s %s\n' blip 2222 "$gw_host_pubkey"
            		printf '[%s]:%s %s\n' blip-gateway 2222 "$gw_host_pubkey"
            	} | tee ~runner/.ssh/known_hosts > /etc/ssh/ssh_known_hosts
            	chmod 644 ~runner/.ssh/known_hosts /etc/ssh/ssh_known_hosts
            	chown runner:runner ~runner/.ssh/known_hosts
            fi

            # Restart sshd BEFORE registering keys. The gateway connects
            # immediately after registration, so sshd must be ready first.
            systemctl enable ssh
            systemctl restart ssh

            # Register host+client keys with the gateway. Keys are colon-joined
            # because the SSH exec protocol splits arguments on spaces.
            host_key="$(awk '{printf "%s:%s", $1, $2}' /etc/ssh/ssh_host_ed25519_key.pub)"
            client_key="$(awk '{printf "%s:%s", $1, $2}' /etc/ssh/ssh_client_ed25519_key.pub)"
            sa_token="$(cat "$SA_TOKEN_DIR/token")"

            ok=false
            for _ in $(seq 1 10); do
            	resp=$(sshpass -p "$sa_token" ssh \
            		-o BatchMode=no \
            		-o StrictHostKeyChecking=yes \
            		-o PreferredAuthentications=password \
            		-o PubkeyAuthentication=no \
            		-o ConnectTimeout=10 \
            		-p 2222 "_register@${GW_HOST}" \
            		"register-keys --host-key $host_key --client-key $client_key" 2>/dev/null) || true
            	if printf '%s' "$resp" | grep -q '"ok":true'; then ok=true; break; fi
            	sleep 2
            done
            [ "$ok" = true ] || { echo "[blip-setup] FATAL: key registration failed" >&2; exit 1; }

            echo "[blip-setup] complete"
        - chmod -x /etc/update-motd.d/*
        - systemctl disable --now snapd.service snapd.socket snapd.seeded.service snapd.snap-repair.timer multipathd.service multipathd.socket ModemManager.service unattended-upgrades.service apt-daily.timer apt-daily-upgrade.timer udisks2.service polkit.service fwupd.service packagekit.service networkd-dispatcher.service 2>/dev/null || true
        - apt-get purge -y --auto-remove snapd && rm -rf /snap /var/snap /var/lib/snapd /var/cache/snapd || true
        - touch /etc/cloud/cloud-init.disabled
        - mkdir -p /etc/systemd/journald.conf.d && printf '[Journal]\nSystemMaxUse=16M\nRuntimeMaxUse=16M\n' > /etc/systemd/journald.conf.d/size.conf && systemctl restart systemd-journald
        - sync && echo 3 > /proc/sys/vm/drop_caches || true
---
apiVersion: pool.kubevirt.io/v1beta1
kind: VirtualMachinePool
metadata:
  name: blip
  namespace: blip
spec:
  replicas: 5
  selector:
    matchLabels:
      blip.io/pool: blip
  virtualMachineTemplate:
    metadata:
      labels:
        blip.io/pool: blip
    spec:
      dataVolumeTemplates:
      - metadata:
          name: rootdisk
        spec:
          storage:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 32Gi
          source:
            registry:
              url: docker://quay.io/containerdisks/ubuntu:24.04
      runStrategy: Always
      template:
        metadata:
          labels:
            blip.io/pool: blip
        spec:
          evictionStrategy: None
          priorityClassName: blip-low-priority
          domain:
            cpu:
              cores: 2
              sockets: 1
              threads: 1
            devices:
              disks:
              - disk:
                  bus: virtio
                name: rootdisk
              - disk:
                  bus: virtio
                name: cloudinitdisk
              filesystems:
              - name: gw-client-pubkey
                virtiofs: {}
              - name: gw-host-pubkey
                virtiofs: {}
              - name: sa-token
                virtiofs: {}
              interfaces:
              - masquerade: {}
                name: default
            memory:
              guest: 4Gi
            resources:
              overcommitGuestOverhead: true
              requests:
                cpu: 500m
                memory: 1Gi
          networks:
          - name: default
            pod: {}
          readinessProbe:
            failureThreshold: 10
            initialDelaySeconds: 5
            periodSeconds: 3
            tcpSocket:
              port: 22
          terminationGracePeriodSeconds: 5
          volumes:
          - dataVolume:
              name: rootdisk
            name: rootdisk
          - name: gw-client-pubkey
            configMap:
              name: ssh-gateway-client-pubkey
          - name: gw-host-pubkey
            configMap:
              name: ssh-gateway-host-pubkey
          - name: sa-token
            serviceAccount:
              serviceAccountName: vm-register
          - cloudInitNoCloud:
              secretRef:
                name: default-cloudinit
            name: cloudinitdisk
