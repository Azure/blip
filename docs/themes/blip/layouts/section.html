{{ define "main" }}
<div class="docs-layout">
  {{ partial "docs-sidebar.html" . }}
  <article class="docs-content">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ if .Pages }}
    <div class="docs-list">
      {{ range .Pages.ByWeight }}
      <a href="{{ .RelPermalink }}" class="docs-list-item">
        <span class="docs-list-title">{{ .Title }}</span>
        <span class="docs-list-desc">{{ .Description }}</span>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </article>
</div>
{{ end }}
